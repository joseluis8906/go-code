syntax = "proto3";

package delivery.waiter.protobuf;

import "google/protobuf/wrappers.proto";
import "protobuf/delivery/delivery.proto";

option go_package = "github.com/joseluis8906/go-code/protobuf/deliver/waiterpb";

service Waiter {
  rpc AddProductToOrder(AddProductToOrderRequest) returns (google.protobuf.Empty)
}

message AddProductToOrderRequest {
  delivery.protobuf.Customer customer = 1;
  delivery.protobuf.Product product = 2;
}

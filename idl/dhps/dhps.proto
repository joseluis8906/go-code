syntax = "proto3";

package dhps;

option go_package = "github.com/joseluis8906/go-code/idl/dhpspb";

message Product {
  uint64 ref = 1;
  string name = 2;
}

service Delivery {
  rpc CustomerAsksForAProduct(CustomerAsksForAProductReq) returns (CustomerAsksForAProductRes);
}

message CustomerAsksForAProductReq {
  string customer_email = 1;
  string product_name = 2;
}

message CustomerAsksForAProductRes {
  repeated Product products = 1;
}
